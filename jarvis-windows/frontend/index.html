<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>JARVIS</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#050508; color:#e0e0e0; font-family:system-ui; display:flex; flex-direction:column; height:100vh; align-items:center; justify-content:center; }
    #orb-container { width:300px; height:300px; }
    #status { margin-top:1rem; font-size:0.85rem; color:#888; letter-spacing:.05em; text-transform:uppercase; }
    #transcript { max-width:500px; margin-top:1rem; text-align:center; font-size:1rem; color:#ccc; min-height:2rem; }
    #response { max-width:500px; margin-top:0.5rem; text-align:center; font-size:0.95rem; color:#7eb8f7; min-height:2rem; }
    #btn-row { display:flex; gap:1rem; margin-top:1.5rem; }
    button { padding:.6rem 1.4rem; border-radius:999px; border:1px solid #333; background:#111; color:#ccc; cursor:pointer; font-size:.85rem; transition:all .2s; }
    button:hover { border-color:#555; color:#fff; }
    button.active { border-color:#7eb8f7; color:#7eb8f7; }
  </style>
</head>
<body>
  <div id="orb-container"></div>
  <div id="status">idle</div>
  <div id="transcript"></div>
  <div id="response"></div>
  <div id="btn-row">
    <button id="btn-listen">Hold to speak</button>
    <button id="btn-deep">Deep mode</button>
  </div>
  <script type="module" src="/main.ts"></script>
</body>
</html>
